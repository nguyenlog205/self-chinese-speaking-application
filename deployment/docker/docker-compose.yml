version: '3.8'

services:
  backend:
    build:
      context: ../..                # thư mục gốc project (chứa src, config,...)
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: chinese-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount thư mục chứa model từ host (thay đổi đường dẫn bên trái theo máy bạn)
      - /path/to/your/models:/app/models
      # (Tùy chọn) Mount code để dev nóng
      - ../../src:/app/src
      - ../../config:/app/config
    environment:
      - MODEL_BASE_PATH=/app/models
      - TTS_MODEL_PATH=/app/models/qwen-tts
      - WHISPER_MODEL_PATH=/app/models/whisper
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployment/docker/frontend/Dockerfile
    container_name: chinese-frontend
    ports:
      - "5173:5173"  # hoặc 80 nếu dùng nginx
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge