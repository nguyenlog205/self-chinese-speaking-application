apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chinese-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: chinese-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chinese-frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: chinese-backend-service
            port:
              number: 8000