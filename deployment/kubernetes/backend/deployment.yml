apiVersion: apps/v1
kind: Deployment
metadata:
  name: chinese-backend
  labels:
    app: chinese-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chinese-backend
  template:
    metadata:
      labels:
        app: chinese-backend
    spec:
      containers:
      - name: backend
        image: chinese-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: TTS_API_HOST
          value: "0.0.0.0"
        - name: TTS_API_PORT
          value: "8000"
        - name: TTS_SYSTEM_LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5