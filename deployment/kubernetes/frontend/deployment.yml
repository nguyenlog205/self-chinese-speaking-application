apiVersion: apps/v1
kind: Deployment
metadata:
  name: chinese-frontend
  labels:
    app: chinese-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chinese-frontend
  template:
    metadata:
      labels:
        app: chinese-frontend
    spec:
      containers:
      - name: frontend
        image: chinese-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10